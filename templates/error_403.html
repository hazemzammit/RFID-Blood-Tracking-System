<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 - Accès Interdit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .error-container {
            text-align: center;
            color: #333;
        }
        
        .error-code {
            font-size: 150px;
            font-weight: bold;
            text-shadow: 3px 3px 10px rgba(0,0,0,0.1);
        }
        
        .error-icon {
            font-size: 100px;
            margin-bottom: 30px;
            color: #dc3545;
        }
        
        .error-title {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        
        .error-message {
            font-size: 1.2rem;
            margin-bottom: 40px;
        }
        
        .btn-home {
            background: #dc3545;
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            color: white;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-icon">
            <i class="fas fa-ban"></i>
        </div>
        <div class="error-code">403</div>
        <h1 class="error-title">Accès Interdit</h1>
        <p class="error-message">
            Vous n'avez pas la permission d'accéder à cette ressource.<br>
            Veuillez contacter l'administrateur si vous pensez qu'il s'agit d'une erreur.
        </p>
        <a href="/" class="btn-home">
            <i class="fas fa-home me-2"></i>Retour à l'Accueil
        </a>
    </div>
</body>
</html>
