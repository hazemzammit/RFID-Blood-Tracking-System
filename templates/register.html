<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - Système de Suivi de Sang</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px 0;
        }
        
        .register-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            max-width: 900px;
            width: 100%;
            display: flex;
        }
        
        .register-left {
            background: linear-gradient(180deg, #28a745 0%, #218838 100%);
            color: white;
            padding: 60px 40px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        
        .register-left i {
            font-size: 80px;
            margin-bottom: 30px;
            opacity: 0.9;
        }
        
        .register-left h2 {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 20px;
        }
        
        .register-left p {
            font-size: 1.1rem;
            opacity: 0.9;
            line-height: 1.6;
        }
        
        .register-right {
            padding: 60px 50px;
            flex: 1;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .register-right h3 {
            color: #333;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .register-right p {
            color: #666;
            margin-bottom: 30px;
        }
        
        .form-control, .form-select {
            padding: 12px 20px;
            border-radius: 10px;
            border: 1px solid #ddd;
            font-size: 1rem;
        }
        
        .form-control:focus, .form-select:focus {
            border-color: #28a745;
            box-shadow: 0 0 0 0.2rem rgba(40, 167, 69, 0.25);
        }
        
        .btn-register {
            background: linear-gradient(135deg, #28a745 0%, #218838 100%);
            color: white;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            border: none;
            width: 100%;
            font-size: 1.1rem;
            transition: transform 0.2s;
        }
        
        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.3);
            color: white;
        }
        
        .alert {
            border-radius: 10px;
        }
        
        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }
        
        .login-link a {
            color: #28a745;
            text-decoration: none;
            font-weight: bold;
        }
        
        .login-link a:hover {
            text-decoration: underline;
        }
        
        .password-strength {
            height: 5px;
            border-radius: 5px;
            margin-top: 5px;
            transition: all 0.3s;
        }
        
        @media (max-width: 768px) {
            .register-container {
                flex-direction: column;
            }
            
            .register-left {
                padding: 40px 30px;
            }
            
            .register-right {
                padding: 40px 30px;
            }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <!-- Left Side - Branding -->
        <div class="register-left">
            <i class="fas fa-user-plus"></i>
            <h2>Rejoignez-nous</h2>
            <p>Créez votre compte pour accéder au système de gestion des dons de sang</p>
            <div class="mt-4">
                <i class="fas fa-shield-alt fa-2x mb-2"></i>
                <p class="small">Sécurisé et Confidentiel</p>
            </div>
        </div>
        
        <!-- Right Side - Register Form -->
        <div class="register-right">
            <h3>Créer un Compte</h3>
            <p>Remplissez le formulaire pour vous inscrire.</p>
            
            <div id="alertContainer"></div>
            
            <form id="registerForm">
                <div class="mb-3">
                    <label class="form-label">
                        <i class="fas fa-user me-2"></i>Nom d'utilisateur <span class="text-danger">*</span>
                    </label>
                    <input type="text" class="form-control" id="username" name="username" required 
                           placeholder="Choisissez un nom d'utilisateur" minlength="3">
                    <small class="text-muted">Au moins 3 caractères</small>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">
                        <i class="fas fa-envelope me-2"></i>Email <span class="text-danger">*</span>
                    </label>
                    <input type="email" class="form-control" id="email" name="email" required 
                           placeholder="votre.email@example.com">
                </div>
                
                <div class="mb-3">
                    <label class="form-label">
                        <i class="fas fa-lock me-2"></i>Mot de passe <span class="text-danger">*</span>
                    </label>
                    <input type="password" class="form-control" id="password" name="password" required 
                           placeholder="Choisissez un mot de passe fort" minlength="6">
                    <div class="password-strength" id="passwordStrength"></div>
                    <small class="text-muted">Au moins 6 caractères</small>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">
                        <i class="fas fa-lock me-2"></i>Confirmer le mot de passe <span class="text-danger">*</span>
                    </label>
                    <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" required 
                           placeholder="Confirmez votre mot de passe">
                </div>
                
                <div class="mb-3">
                    <label class="form-label">
                        <i class="fas fa-user-tag me-2"></i>Rôle <span class="text-danger">*</span>
                    </label>
                    <select class="form-select" id="role" name="role" required>
                        <option value="">Sélectionnez un rôle...</option>
                        <option value="medical_staff">Personnel Médical</option>
                        <option value="admin">Administrateur</option>
                    </select>
                </div>
                
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="terms" required>
                    <label class="form-check-label" for="terms">
                        J'accepte les <a href="#" class="text-success">conditions d'utilisation</a>
                    </label>
                </div>
                
                <button type="submit" class="btn btn-register" id="registerBtn">
                    <i class="fas fa-user-plus me-2"></i>Créer mon Compte
                </button>
            </form>
            
            <div class="login-link">
                Vous avez déjà un compte? 
                <a href="/login">Se connecter</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Password strength indicator
        document.getElementById('password').addEventListener('input', function() {
            const password = this.value;
            const strengthBar = document.getElementById('passwordStrength');
            
            let strength = 0;
            if (password.length >= 6) strength++;
            if (password.length >= 10) strength++;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
            if (/\d/.test(password)) strength++;
            if (/[^a-zA-Z0-9]/.test(password)) strength++;
            
            const colors = ['#dc3545', '#ffc107', '#28a745'];
            const widths = ['33%', '66%', '100%'];
            
            if (strength <= 2) {
                strengthBar.style.backgroundColor = colors[0];
                strengthBar.style.width = widths[0];
            } else if (strength <= 3) {
                strengthBar.style.backgroundColor = colors[1];
                strengthBar.style.width = widths[1];
            } else {
                strengthBar.style.backgroundColor = colors[2];
                strengthBar.style.width = widths[2];
            }
        });
        
        // Form submission
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const role = document.getElementById('role').value;
            const registerBtn = document.getElementById('registerBtn');
            const alertContainer = document.getElementById('alertContainer');
            
            // Validate passwords match
            if (password !== confirmPassword) {
                alertContainer.innerHTML = `
                    <div class="alert alert-danger alert-dismissible fade show">
                        <i class="fas fa-exclamation-triangle me-2"></i>
                        Les mots de passe ne correspondent pas
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                `;
                return;
            }
            
            // Disable button
            registerBtn.disabled = true;
            registerBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Création du compte...';
            
            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, email, password, role })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // Show success
                    alertContainer.innerHTML = `
                        <div class="alert alert-success">
                            <i class="fas fa-check-circle me-2"></i>
                            Compte créé avec succès! Redirection vers la connexion...
                        </div>
                    `;
                    
                    // Redirect to login
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                } else {
                    // Show error
                    alertContainer.innerHTML = `
                        <div class="alert alert-danger alert-dismissible fade show">
                            <i class="fas fa-exclamation-triangle me-2"></i>
                            ${data.detail || 'Erreur lors de la création du compte'}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    `;
                    
                    // Re-enable button
                    registerBtn.disabled = false;
                    registerBtn.innerHTML = '<i class="fas fa-user-plus me-2"></i>Créer mon Compte';
                }
            } catch (error) {
                console.error('Erreur:', error);
                alertContainer.innerHTML = `
                    <div class="alert alert-danger alert-dismissible fade show">
                        <i class="fas fa-exclamation-triangle me-2"></i>
                        Erreur de connexion au serveur
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                `;
                
                // Re-enable button
                registerBtn.disabled = false;
                registerBtn.innerHTML = '<i class="fas fa-user-plus me-2"></i>Créer mon Compte';
            }
        });
        
        // Check if already logged in
        if (localStorage.getItem('access_token')) {
            window.location.href = '/';
        }
    </script>
</body>
</html>
